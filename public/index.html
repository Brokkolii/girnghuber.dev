<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>girnghuber.dev</title>
        <meta
            name="description"
            content="Personal homeserver and chat hub of girnghuber.dev."
        />
        <style>
            :root {
                --bg: #0a0a14;
                --fg: #e8e8f0;
                --muted: #8a8aa0;
                --accent: #7c5cff;
                --accent2: #ff5cc8;
                --card: rgba(255, 255, 255, 0.04);
                --border: rgba(255, 255, 255, 0.08);
            }
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            html,
            body {
                height: 100%;
            }
            body {
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui,
                    sans-serif;
                background: var(--bg);
                color: var(--fg);
                overflow-x: hidden;
                line-height: 1.6;
            }

            /* Animated gradient backdrop */
            .backdrop {
                position: fixed;
                inset: 0;
                z-index: -1;
                background:
                    radial-gradient(
                        ellipse 80% 60% at 20% 10%,
                        rgba(124, 92, 255, 0.35),
                        transparent 60%
                    ),
                    radial-gradient(
                        ellipse 70% 50% at 85% 30%,
                        rgba(255, 92, 200, 0.25),
                        transparent 60%
                    ),
                    radial-gradient(
                        ellipse 60% 60% at 50% 100%,
                        rgba(92, 200, 255, 0.2),
                        transparent 60%
                    ),
                    var(--bg);
                animation: drift 20s ease-in-out infinite alternate;
            }
            @keyframes drift {
                0% {
                    transform: translate3d(0, 0, 0) scale(1);
                }
                100% {
                    transform: translate3d(-2%, -2%, 0) scale(1.05);
                }
            }

            /* Hero */
            .hero {
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                text-align: center;
                padding: 2rem;
                position: relative;
            }
            .hero h1 {
                font-size: clamp(3rem, 10vw, 7rem);
                font-weight: 800;
                letter-spacing: -0.04em;
                background: linear-gradient(
                    135deg,
                    #fff 0%,
                    var(--accent) 50%,
                    var(--accent2) 100%
                );
                -webkit-background-clip: text;
                background-clip: text;
                color: transparent;
                margin-bottom: 1rem;
            }
            .hero p.tagline {
                font-size: clamp(1rem, 2.5vw, 1.4rem);
                color: var(--muted);
                max-width: 600px;
                margin-bottom: 3rem;
            }

            .cta {
                display: inline-flex;
                align-items: center;
                gap: 0.75rem;
                padding: 1.1rem 2.2rem;
                font-size: 1.15rem;
                font-weight: 600;
                color: #fff;
                text-decoration: none;
                background: linear-gradient(
                    135deg,
                    var(--accent),
                    var(--accent2)
                );
                border-radius: 999px;
                box-shadow: 0 10px 40px rgba(124, 92, 255, 0.4);
                transition:
                    transform 0.2s ease,
                    box-shadow 0.2s ease;
                position: relative;
                overflow: hidden;
            }
            .cta::before {
                content: "";
                position: absolute;
                inset: 0;
                background: linear-gradient(
                    135deg,
                    var(--accent2),
                    var(--accent)
                );
                opacity: 0;
                transition: opacity 0.3s ease;
            }
            .cta:hover {
                transform: translateY(-2px);
                box-shadow: 0 14px 50px rgba(124, 92, 255, 0.55);
            }
            .cta:hover::before {
                opacity: 1;
            }
            .cta span {
                position: relative;
                z-index: 1;
            }

            .scroll-hint {
                position: absolute;
                bottom: 2rem;
                left: 50%;
                transform: translateX(-50%);
                color: var(--muted);
                font-size: 0.85rem;
                animation: bob 2s ease-in-out infinite;
            }
            @keyframes bob {
                0%,
                100% {
                    transform: translate(-50%, 0);
                }
                50% {
                    transform: translate(-50%, 8px);
                }
            }

            /* Links section */
            .links-section {
                padding: 6rem 2rem;
                max-width: 1100px;
                margin: 0 auto;
            }
            .links-section h2 {
                font-size: 2rem;
                margin-bottom: 2.5rem;
                text-align: center;
                font-weight: 700;
            }
            .links-grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
                gap: 1.2rem;
            }
            .link-card {
                display: flex;
                flex-direction: column;
                gap: 0.4rem;
                padding: 1.6rem;
                background: var(--card);
                border: 1px solid var(--border);
                border-radius: 16px;
                text-decoration: none;
                color: var(--fg);
                backdrop-filter: blur(10px);
                transition:
                    transform 0.2s ease,
                    border-color 0.2s ease,
                    background 0.2s ease;
            }
            .link-card:hover {
                transform: translateY(-4px);
                border-color: var(--accent);
                background: rgba(124, 92, 255, 0.08);
            }
            .link-card .label {
                font-size: 0.8rem;
                color: var(--muted);
                text-transform: uppercase;
                letter-spacing: 0.08em;
            }
            .link-card .name {
                font-size: 1.15rem;
                font-weight: 600;
            }

            /* Footer */
            footer {
                border-top: 1px solid var(--border);
                padding: 3rem 2rem 2rem;
                text-align: center;
                color: var(--muted);
                font-size: 0.9rem;
            }
            footer a {
                color: var(--fg);
                text-decoration: none;
                margin: 0 0.6rem;
            }
            footer a:hover {
                color: var(--accent);
            }
            footer .legal {
                margin-top: 1rem;
                font-size: 0.8rem;
            }
            footer .copy {
                margin-top: 1rem;
                font-size: 0.75rem;
                opacity: 0.6;
            }
        </style>
    </head>
    <body>
        <div class="backdrop"></div>

        <section class="hero">
            <h1>girnghuber.dev</h1>
            <p class="tagline">Come say hi on Matrix.</p>
            <a href="https://chat.girnghuber.dev" class="cta">
                <span>Open Brokky-Chat →</span>
            </a>
            <div class="scroll-hint">▾ more below</div>
        </section>

        <section class="links-section">
            <h2>Find me elsewhere</h2>
            <div class="links-grid">
                <a
                    class="link-card"
                    href="https://bsky.app/profile/girnghuber.dev"
                    rel="me"
                >
                    <span class="label">Social</span>
                    <span class="name">Bluesky</span>
                </a>
                <a class="link-card" href="https://chat.girnghuber.dev">
                    <span class="label">Chat</span>
                    <span class="name">Matrix (Cinny)</span>
                </a>
                <a
                    class="link-card"
                    href="https://matrix.to/#/@brokkolii:girnghuber.dev"
                >
                    <span class="label">Matrix ID</span>
                    <span class="name">@brokkolii:girnghuber.dev</span>
                </a>
                <!-- Add more cards here as needed -->
            </div>
        </section>

        <footer>
            <div>
                <a href="mailto:hello@girnghuber.dev">hello@girnghuber.dev</a>
            </div>
            <div class="legal">
                <a href="/privacy.html">Privacy</a> ·
                <a href="/imprint.html">Imprint</a> .
                <a href="/.well-known/security.txt">Security</a>
            </div>
            <div class="copy">© <span id="y"></span> girnghuber.dev</div>
        </footer>
        <script>
            document.getElementById("y").textContent = new Date().getFullYear();
        </script>
    </body>
</html>
